# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# The language of the webpage > http://www.lingoes.net/en/translator/langcode.htm
# If it has the same name as one of the files in folder `_data/locales`, the layout language will also be changed,
# otherwise, the layout language will use the default value of 'en'.
lang: zh-CN

# Change to your timezone > https://zones.arilyn.cc
timezone: Asia/Shanghai

# jekyll-seo-tag settings > https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# v --------------------------

title: TheDudeAbula

tagline: AI Infra, LLM Deployment, HPC

description: >-
  TheDudeAbula 的个人站点，记录 AI 基础设施、大模型部署与高性能计算实践。

# Fill in the protocol & hostname for your site.
# E.g. 'https://username.github.io', note that it does not end with a '/'.
url: "https://brokedudeabula.github.io"

github:
  username: BrokeDudeAbula

twitter:
  username:

social:
  # Change to your full name.
  # It will be displayed as the default author of the posts and the copyright owner in the Footer
  name: TheDudeAbula
  email: liyang@siat.ac.cn
  fediverse_handle:
  links:
    # The first element serves as the copyright owner's link
    - https://github.com/BrokeDudeAbula

# Site Verification Settings
webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

# ^ --------------------------
# The end of `jekyll-seo-tag` settings

# Web Analytics Settings
analytics:
  google:
    id:
  goatcounter:
    id:
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

# Page views settings
pageviews:
  provider:

# Prefer color scheme setting.
#
# Note: Keep empty will follow the system prefer color by default,
# and there will be a toggle to switch the theme between dark and light
# on the bottom left of the sidebar.
#
# Available options:
#
#     light - Use the light color scheme
#     dark - Use the dark color scheme
#
theme_mode:

# The CDN endpoint for media resources.
# Notice that once it is assigned, the CDN url
# will be added to all media resources (site avatar, posts' images, audio and video files) paths starting with '/'
#
# e.g. 'https://cdn.com'
cdn:

# the avatar on sidebar, support local or CORS resources
avatar:

# The URL of the site-wide social preview image used in SEO `og:image` meta tag.
# It can be overridden by a customized `page.image` in front matter.
social_preview_image:

# boolean type, the global switch for TOC in posts.
toc: true

comments:
  # Global switch for the post-comment system. Keeping it empty means disabled.
  provider:
  # The provider options are as follows:
  disqus:
    shortname:
  # utterances settings > https://utteranc.es/
  utterances:
    repo:
    issue_term:
  # Giscus options > https://giscus.app
  giscus:
    repo:
    repo_id:
    category:
    category_id:
    mapping:
    strict:
    input_position:
    lang:
    reactions_enabled:

# Self-hosted static assets, optional > https://github.com/cotes2020/chirpy-static-assets
assets:
  self_host:
    enabled: false
    # specify the Jekyll environment, empty means both
    # only works if `assets.self_host.enabled` is 'true'
    env:

pwa:
  enabled: true
  cache:
    enabled: true
    # Paths defined here will be excluded from the PWA cache.
    # Usually its value is the `baseurl` of another website that
    # shares the same domain name as the current website.
    deny_paths:

paginate: 10

# The base URL of your site
baseurl: "/the.dude.abula.github.io"

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order
  games:
    output: true
    permalink: /games/:title/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      # DO NOT modify the following parameter unless you are confident enough
      # to update the code of all other post links in this project.
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/
  - scope:
      path: ""
      type: games
    values:
      layout: game
      toc: false

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - README.md
  - LICENSE
  - MIGRATION_CHIRPY.md
  - MIGRATION_CHIRPY_REVIEW.md
  - IFLOW.md
  - AGENTS.md
  - CLAUDE.md
  - game-recommendations.md
  - opt_suggest.md
  - clean_cache.sh
  - Gemfile.lock
  - _migration_backup
  - _site
  - .jekyll-cache
  - .sass-cache
  - .bundle
  - node_modules
  - vendor
  - docs
  - tools
  - purgecss.js
  - "*.config.js"
  - "package*.json"
  - prompt.md

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
